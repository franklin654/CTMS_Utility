<button
  mat-icon-button
  [matMenuTriggerFor]="menu"
  (menuOpened)="onMenuOpened()"
  [matBadge]="unreadCount() > 0 ? unreadCount() : null"
  matBadgeColor="warn"
  matBadgeSize="small"
  aria-label="Notifications"
>
  <span class="text-xl">&#128276;</span>
</button>

<mat-menu #menu="matMenu" xPosition="before">
  <div class="w-80">
    <!-- Deliberately outside the scrollable list below -- nesting this inside the scroll
         container previously let it get clipped/cut off along with the list. -->
    <div class="flex items-center justify-between px-4 py-2 border-b bg-white">
      <span class="eyebrow">Notifications</span>
      <button class="text-xs text-prussian hover:underline whitespace-nowrap" (click)="markAllRead(); $event.stopPropagation()">
        Mark all read
      </button>
    </div>

    <div class="max-h-96 overflow-y-auto">
      @if (notifications().length === 0) {
        <p class="text-sm text-graphite px-4 py-6 text-center">No notifications</p>
      }

      @for (n of notifications(); track n.id) {
        <button
          type="button"
          class="w-full text-left px-4 py-3 border-b border-l-[3px] hover:bg-paper flex flex-col gap-0.5"
          [class.ctms-notification-unread]="!n.read"
          [class.border-l-transparent]="n.read"
          (click)="markRead(n); $event.stopPropagation()"
        >
          <span class="text-sm font-medium text-ink">{{ n.title }}</span>
          @if (n.body) {
            <span class="text-xs text-graphite">{{ n.body }}</span>
          }
          <span class="text-xs code text-graphite/70">{{ n.createdAt | date: 'short' }}</span>
        </button>
      }
    </div>
  </div>
</mat-menu>
