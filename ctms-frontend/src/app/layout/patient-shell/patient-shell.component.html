<div class="min-h-screen bg-gradient-to-br from-gray-50 to-slate-100 flex flex-col">
  <nav class="bg-white border-b border-b-2 border-b-blue-600/20 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <span class="font-semibold text-blue-700 tracking-tight">CTMS Patient Portal</span>
      <div class="flex items-center gap-4 text-sm">
        <a routerLink="/patient/visits" class="text-gray-700 hover:text-blue-700" routerLinkActive="text-blue-700 font-medium">My Visits</a>
        <a routerLink="/patient/documents" class="text-gray-700 hover:text-blue-700" routerLinkActive="text-blue-700 font-medium">My Documents</a>
        <a routerLink="/patient/profile" class="text-gray-700 hover:text-blue-700" routerLinkActive="text-blue-700 font-medium">My Profile</a>
        <a routerLink="/patient/report-health-issue" class="text-gray-700 hover:text-blue-700" routerLinkActive="text-blue-700 font-medium">Report a Health Issue</a>
        <a routerLink="/patient/notifications" class="text-gray-700 hover:text-blue-700" routerLinkActive="text-blue-700 font-medium">Notifications</a>
        <a routerLink="/patient/account-settings" class="text-gray-700 hover:text-blue-700" routerLinkActive="text-blue-700 font-medium">Account Settings</a>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <app-notification-bell />
      <span class="text-sm text-gray-600">{{ authService.currentUser()?.username }}</span>
      <button mat-stroked-button (click)="logout()">Sign out</button>
    </div>
  </nav>

  <main class="p-6 flex-1">
    <router-outlet />
  </main>

  <footer class="border-t bg-white px-6 py-4 text-xs text-gray-500 flex items-center justify-between">
    <span>CTMS &mdash; Clinical Trial Management System</span>
    <span>Deterministic, rules-driven, no AI/ML in trial decisions</span>
  </footer>
</div>
