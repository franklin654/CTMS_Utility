<mat-sidenav-container class="min-h-screen bg-gradient-to-br from-gray-50 to-slate-100">
  <mat-sidenav mode="side" opened class="w-60 bg-white border-r">
    <div class="px-4 py-4 border-b">
      <span class="font-semibold text-blue-700 text-lg tracking-tight">CTMS</span>
    </div>
    <mat-nav-list class="text-sm">
      <a mat-list-item routerLink="/dashboard" routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4">Dashboard</a>
      <a mat-list-item routerLink="/studies" routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4">Studies</a>
      <a mat-list-item routerLink="/sites" routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4">Sites</a>
      <a mat-list-item routerLink="/subjects" routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4">Subjects</a>
      <a mat-list-item routerLink="/documents" routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4">Documents</a>
      <a
        *appHasRole="['STUDY_MANAGER', 'QA_COMPLIANCE_AUDITOR', 'ADMIN']"
        mat-list-item
        routerLink="/documents/approval-queue"
        routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4"
      >
        Approval Queue
      </a>
      <a
        *appHasRole="['STUDY_MANAGER', 'ADMIN', 'SITE_COORDINATOR', 'INVESTIGATOR', 'CRA_MONITOR', 'DATA_MANAGEMENT', 'FINANCE_MANAGER', 'QA_COMPLIANCE_AUDITOR', 'CLINICAL_LEADERSHIP', 'EXECUTIVE', 'SPONSOR_CRO_LEADERSHIP']"
        mat-list-item
        routerLink="/tasks"
        routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4"
      >
        Tasks
      </a>
      <a
        *appHasRole="['INVESTIGATOR', 'STUDY_MANAGER', 'ADMIN', 'CRA_MONITOR']"
        mat-list-item
        routerLink="/adverse-events/board"
        routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4"
      >
        AE Board
      </a>
      <a *appHasRole="['FINANCE_MANAGER', 'ADMIN']" mat-list-item routerLink="/payments" routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4">
        Payments
      </a>
      <a mat-list-item routerLink="/notifications" routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4">Notifications</a>
      <a *appHasRole="['ADMIN']" mat-list-item routerLink="/admin/rule-sets" routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4">
        Rule Sets
      </a>
      <a *appHasRole="['ADMIN', 'QA_COMPLIANCE_AUDITOR']" mat-list-item routerLink="/admin/audit-log" routerLinkActive="bg-blue-50 text-blue-700 border-l-4 border-blue-600 -ml-1 pl-4">
        Audit Log
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="flex flex-col min-h-screen">
    <mat-toolbar class="bg-white border-b border-b-2 border-b-blue-600/20 flex items-center justify-end gap-4">
      <app-notification-bell />
      <span class="text-sm text-gray-600">{{ authService.currentUser()?.username }}</span>
      <button mat-stroked-button (click)="logout()">Sign out</button>
    </mat-toolbar>

    <main class="p-6 flex-1">
      <router-outlet />
    </main>

    <footer class="border-t bg-white px-6 py-4 text-xs text-gray-500 flex items-center justify-between">
      <span>CTMS &mdash; Clinical Trial Management System</span>
      <span>Deterministic, rules-driven, no AI/ML in trial decisions</span>
    </footer>
  </mat-sidenav-content>
</mat-sidenav-container>
