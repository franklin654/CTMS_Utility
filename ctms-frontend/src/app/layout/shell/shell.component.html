<div class="min-h-screen bg-gray-50">
  <nav class="bg-white border-b px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <span class="font-semibold text-gray-900">CTMS</span>
      <div class="flex items-center gap-4 text-sm">
        <a routerLink="/dashboard" class="text-gray-700 hover:text-gray-900">Dashboard</a>
        <a routerLink="/studies" class="text-gray-700 hover:text-gray-900">Studies</a>
        <a routerLink="/sites" class="text-gray-700 hover:text-gray-900">Sites</a>
        <a routerLink="/documents" class="text-gray-700 hover:text-gray-900">Documents</a>
        <a
          *appHasRole="['STUDY_MANAGER', 'QA_COMPLIANCE_AUDITOR', 'ADMIN']"
          routerLink="/documents/approval-queue"
          class="text-gray-700 hover:text-gray-900"
        >
          Approval Queue
        </a>
        <a *appHasRole="['ADMIN']" routerLink="/admin/rule-sets" class="text-gray-700 hover:text-gray-900">
          Rule Sets
        </a>
        <a *appHasRole="['ADMIN', 'QA_COMPLIANCE_AUDITOR']" routerLink="/admin/audit-log" class="text-gray-700 hover:text-gray-900">
          Audit Log
        </a>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <app-notification-bell />
      <span class="text-sm text-gray-600">{{ authService.currentUser()?.username }}</span>
      <button mat-stroked-button (click)="logout()">Sign out</button>
    </div>
  </nav>

  <main class="p-6">
    <router-outlet />
  </main>
</div>
