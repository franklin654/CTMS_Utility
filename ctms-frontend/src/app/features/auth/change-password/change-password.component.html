<div class="min-h-screen flex flex-col items-center justify-center bg-paper px-4">
  <span class="font-mono text-sm font-semibold text-prussian tracking-tight mb-4">CTMS</span>
  <div class="w-full max-w-sm bg-white rounded-lg shadow p-8">
    <h1 class="text-xl font-semibold text-ink mb-2">Update Your Password</h1>
    <p class="text-sm text-graphite mb-6">Your password has expired and must be changed before continuing.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Current password</mat-label>
        <input matInput type="password" formControlName="currentPassword" autocomplete="current-password" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>New password</mat-label>
        <input matInput type="password" formControlName="newPassword" autocomplete="new-password" />
      </mat-form-field>

      @if (errorMessage()) {
        <p class="text-sm text-red-600">{{ errorMessage() }}</p>
      }

      <button mat-flat-button color="primary" type="submit" class="w-full" [disabled]="form.invalid">
        Update password
      </button>
    </form>
  </div>
</div>
