<h2 mat-dialog-title>Advance to {{ data.targetStatus }}</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="w-full mt-2">
    <mat-label>Justification</mat-label>
    <textarea matInput [formControl]="justification" rows="4"></textarea>
    <mat-hint>Reason for this transition</mat-hint>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="justification.invalid" (click)="confirm()">Confirm</button>
</mat-dialog-actions>
