<h2 mat-dialog-title class="text-red-700">Close Out Study</h2>
<mat-dialog-content>
  <p class="text-sm text-gray-600 mb-4">
    This is an irreversible, compliance-gated action (21 CFR Part 11 e-signature). Re-enter your
    password and a reason to confirm.
  </p>
  <form [formGroup]="form" class="flex flex-col gap-3">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Reason for closeout</mat-label>
      <textarea matInput formControlName="reason" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="warn" [disabled]="form.invalid" (click)="confirm()">Sign &amp; Close Out</button>
</mat-dialog-actions>
