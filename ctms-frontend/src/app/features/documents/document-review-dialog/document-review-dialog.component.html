<h2 mat-dialog-title>
  @switch (data.action) {
    @case ('APPROVED') { Approve Document Version }
    @case ('REJECTED') { Reject Document Version }
    @default { Request Changes }
  }
</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="w-full mt-2">
    <mat-label>Comment{{ commentRequired ? '' : ' (optional)' }}</mat-label>
    <textarea matInput [formControl]="comment" rows="4"></textarea>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="comment.invalid" (click)="confirm()">Confirm</button>
</mat-dialog-actions>
