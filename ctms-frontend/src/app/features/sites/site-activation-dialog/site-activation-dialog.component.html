<h2 mat-dialog-title class="text-red-700">Activate Site (E-Signature)</h2>
<mat-dialog-content>
  <p class="text-sm text-gray-600 mb-4">
    Site activation is a go-live, compliance-gated action. Re-enter your password and a reason to confirm.
  </p>
  <form [formGroup]="form" class="flex flex-col gap-3">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Reason for activation</mat-label>
      <textarea matInput formControlName="reason" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="warn" [disabled]="form.invalid" (click)="confirm()">Sign &amp; Activate</button>
</mat-dialog-actions>
