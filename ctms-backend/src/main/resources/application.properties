spring.application.name=ctms-backend

# --- Datasource (PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ctms}
spring.datasource.username=${DB_USERNAME:ctms}
spring.datasource.password=${DB_PASSWORD:ctms}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Flyway owns the schema; Hibernate only validates it matches the entities.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- JWT ---
# security.jwt.secret must be a base64-encoded 256+ bit key in real environments (override via env var).
security.jwt.secret=${JWT_SECRET:ZmFrZS1kZXYtb25seS1zZWNyZXQta2V5LWRvLW5vdC11c2UtaW4tcHJvZC1wbGVhc2U=}
security.jwt.access-token-expiry-minutes=${JWT_ACCESS_EXPIRY_MIN:15}
security.jwt.refresh-token-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}

# --- Account lockout / password policy ---
security.password.max-failed-attempts=${PASSWORD_MAX_FAILED_ATTEMPTS:5}
security.password.lockout-duration-minutes=${PASSWORD_LOCKOUT_MINUTES:30}
security.password.expiry-days=${PASSWORD_EXPIRY_DAYS:90}
security.password.history-size=${PASSWORD_HISTORY_SIZE:5}

# --- Mail (self-hosted/internal SMTP only, no third-party transactional email API) ---
# notification.email.enabled=false means notifications are recorded/delivered in-app only and
# email delivery is skipped (logged instead) -- flip to true once pointed at a real internal SMTP relay.
notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}
notification.mail.from=${NOTIFICATION_FROM_ADDRESS:no-reply@ctms.local}
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:25}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}

# --- File storage ---
storage.provider=${STORAGE_PROVIDER:local}
storage.local.base-path=${STORAGE_LOCAL_BASE_PATH:./data/documents}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
# Actuator's mail health check probes the SMTP host even when email sending is disabled -- skip it.
management.health.mail.enabled=false
